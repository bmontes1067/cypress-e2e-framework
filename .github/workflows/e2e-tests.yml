name: 🧪 E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 7 * * *'

jobs:
  cypress-run:
    name: Cypress E2E — ${{ matrix.browser }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run Cypress tests (${{ matrix.browser }})
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
        env:
          CYPRESS_BASE_URL:                         ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_STANDARD_USER_USERNAME:           ${{ secrets.CYPRESS_STANDARD_USER_USERNAME }}
          CYPRESS_LOCKED_OUT_USER_USERNAME:         ${{ secrets.CYPRESS_LOCKED_OUT_USER_USERNAME }}
          CYPRESS_PROBLEM_USER_USERNAME:            ${{ secrets.CYPRESS_PROBLEM_USER_USERNAME }}
          CYPRESS_PERFORMANCE_GLITCH_USER_USERNAME: ${{ secrets.CYPRESS_PERFORMANCE_GLITCH_USER_USERNAME }}
          CYPRESS_PASSWORD:                         ${{ secrets.CYPRESS_PASSWORD }}
          CYPRESS_FIRST_NAME:                       ${{ secrets.CYPRESS_FIRST_NAME }}
          CYPRESS_LAST_NAME:                        ${{ secrets.CYPRESS_LAST_NAME }}
          CYPRESS_POSTAL_CODE:                      ${{ secrets.CYPRESS_POSTAL_CODE }}

      - name: 📸 Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.browser }}
          path: cypress/screenshots
          retention-days: 7

      - name: 🎥 Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videos-${{ matrix.browser }}
          path: cypress/videos
          retention-days: 7

      - name: 📊 Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: 🚀 Publish Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
